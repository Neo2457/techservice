services:
  app:
    build: .
    container_name: techservice
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-techservice_super_secret_cambiame}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      DB_PATH: /app/database/techservice.db
      UPLOAD_PATH: /app/public/uploads
    volumes:
      # Bind mounts a carpetas del HOST (no volúmenes Docker nombrados).
      # Esto hace que la BD y los uploads sobrevivan a rebuilds, redeploys,
      # docker compose down, etc. Sólo se pierden si borras las carpetas en
      # el filesystem del servidor.
      - ./data/database:/app/database
      - ./data/uploads:/app/public/uploads
